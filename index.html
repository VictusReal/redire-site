<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космический Исследователь</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }

        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(100, 200, 255, 0.85);
            font-size: 13px;
            text-shadow: 0 0 8px rgba(100, 200, 255, 0.4);
            pointer-events: none;
            user-select: none;
        }
        #hud h1 {
            font-size: 16px;
            letter-spacing: 4px;
            margin-bottom: 14px;
            color: rgba(160, 230, 255, 1);
            text-shadow: 0 0 15px rgba(100, 200, 255, 0.7);
        }
        .hud-line { margin: 3px 0; }
        .hud-val { color: rgba(200, 240, 255, 1); }

        #nearest {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 190, 80, 0.85);
            font-size: 12px;
            text-align: right;
            pointer-events: none;
            user-select: none;
            text-shadow: 0 0 8px rgba(255, 180, 60, 0.4);
        }
        #nearestName { font-size: 15px; margin-top: 4px; color: rgba(255, 210, 120, 1); }
        #nearestDist { margin-top: 2px; }
        #nearestType { opacity: 0.6; font-size: 11px; margin-top: 2px; }

        #controls {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(100, 180, 255, 0.5);
            font-size: 11px;
            text-align: center;
            pointer-events: none;
            user-select: none;
            letter-spacing: 1px;
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            width: 24px;
            height: 24px;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(100, 200, 255, 0.5);
            box-shadow: 0 0 4px rgba(100, 200, 255, 0.4);
        }
        #crosshair::before { width: 24px; height: 1px; top: 11px; left: 0; }
        #crosshair::after  { width: 1px; height: 24px; top: 0; left: 11px; }

        #hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(100, 200, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
            letter-spacing: 2px;
            transition: opacity 0.8s;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(100, 200, 255, 0.9);
            z-index: 100;
            transition: opacity 1.2s;
        }
        #loading h1 {
            font-size: 32px;
            letter-spacing: 10px;
            margin-bottom: 12px;
            text-shadow: 0 0 25px rgba(100, 200, 255, 0.8);
        }
        #loading p { letter-spacing: 3px; opacity: 0.5; font-size: 12px; margin-bottom: 30px; }
        .bar { width: 260px; height: 1px; background: rgba(100,200,255,0.15); position: relative; overflow: hidden; }
        .bar-fill {
            position: absolute; top: 0; left: 0; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(100,200,255,0.9), transparent);
            animation: sweep 1.4s linear infinite;
        }
        @keyframes sweep { from { transform: translateX(-100%); } to { transform: translateX(400%); } }

        /* ── MOBILE TOUCH CONTROLS ── */
        #touch-look {
            position: fixed; inset: 0;
            display: none;
            touch-action: none;
            z-index: 5;
        }
        #joystick-zone {
            position: fixed;
            left: 0; bottom: 0;
            width: 48%;
            height: 55%;
            display: none;
            align-items: flex-end;
            justify-content: flex-start;
            padding: 30px;
            touch-action: none;
            z-index: 10;
        }
        #joystick-ring {
            width: 110px; height: 110px;
            border: 1.5px solid rgba(100,200,255,0.3);
            border-radius: 50%;
            position: relative;
            background: rgba(100,200,255,0.04);
            box-shadow: 0 0 20px rgba(100,200,255,0.1);
            flex-shrink: 0;
        }
        #joystick-dot {
            width: 44px; height: 44px;
            background: radial-gradient(circle, rgba(100,200,255,0.7), rgba(60,140,255,0.3));
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            box-shadow: 0 0 14px rgba(100,200,255,0.5);
            transition: transform 0.05s;
            pointer-events: none;
        }
        #boost-btn {
            position: fixed;
            right: 28px; bottom: 38px;
            width: 64px; height: 64px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,180,80,0.5);
            background: rgba(255,160,50,0.1);
            color: rgba(255,200,100,0.9);
            font-family: 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 1px;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            z-index: 10;
            touch-action: none;
            user-select: none;
            box-shadow: 0 0 16px rgba(255,160,50,0.2);
            line-height: 1.3;
        }
        #boost-btn.active {
            background: rgba(255,160,50,0.3);
            box-shadow: 0 0 24px rgba(255,160,50,0.5);
        }
        #boost-btn span { font-size: 20px; }

        @media (max-width: 768px) {
            #hud h1 { font-size: 12px; letter-spacing: 2px; }
            #hud    { font-size: 11px; top: 12px; left: 12px; }
            #nearest { font-size: 10px; top: 12px; right: 12px; }
            #nearestName { font-size: 12px; }
            #crosshair { display: none; }
        }
    </style>
</head>
<body>

<div id="loading">
    <h1>КОСМОС</h1>
    <p>ЗАГРУЗКА ВСЕЛЕННОЙ...</p>
    <div class="bar"><div class="bar-fill"></div></div>
</div>

<div id="hud">
    <h1>★ КОСМИЧЕСКИЙ НАВИГАТОР</h1>
    <div class="hud-line">СКОРОСТЬ: <span class="hud-val" id="speed">0.0</span> пк/с</div>
    <div class="hud-line">X <span class="hud-val" id="posX">0</span></div>
    <div class="hud-line">Y <span class="hud-val" id="posY">0</span></div>
    <div class="hud-line">Z <span class="hud-val" id="posZ">0</span></div>
    <div class="hud-line" style="margin-top:10px">ОБЪЕКТОВ: <span class="hud-val" id="objCount">0</span></div>
</div>

<div id="nearest">
    <div style="letter-spacing:2px;font-size:10px">БЛИЖАЙШИЙ ОБЪЕКТ</div>
    <div id="nearestName">—</div>
    <div id="nearestDist">—</div>
    <div id="nearestType">—</div>
</div>

<div id="crosshair"></div>

<div id="hint">НАЖМИ ДЛЯ ЗАХВАТА МЫШИ</div>

<div id="controls">
    WASD / СТРЕЛКИ — Движение &nbsp;|&nbsp; МЫШЬ — Поворот &nbsp;|&nbsp; SHIFT — Ускорение ×10 &nbsp;|&nbsp; Q/E — Вверх/Вниз
</div>

<!-- Mobile touch controls -->
<div id="touch-look"></div>

<div id="joystick-zone">
    <div id="joystick-ring"><div id="joystick-dot"></div></div>
</div>

<div id="boost-btn"><span>⚡</span>BOOST</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

// ─── RENDERER ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
document.body.appendChild(renderer.domElement);

// ─── SCENE / CAMERA ──────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.5, 400000);
camera.position.set(0, 500, 3000);

// ─── POST-PROCESSING ─────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.65,  // strength
    0.38,  // radius
    0.18   // threshold
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ─── UTILS ───────────────────────────────────────────────────────────────────
const rnd  = (a, b) => a + Math.random() * (b - a);
const rndI = (a, b) => Math.floor(rnd(a, b));

// Creates a crisp star sprite: bright core + 4 diffraction spikes
function starTex() {
    const S = 128;
    const c = document.createElement('canvas');
    c.width = c.height = S;
    const g = c.getContext('2d');
    const H = S / 2;

    // Soft radial glow (the "disc")
    const gr = g.createRadialGradient(H,H,0, H,H,H);
    gr.addColorStop(0,    'rgba(255,255,255,1)');
    gr.addColorStop(0.05, 'rgba(255,255,255,0.95)');
    gr.addColorStop(0.15, 'rgba(255,255,255,0.55)');
    gr.addColorStop(0.35, 'rgba(255,255,255,0.12)');
    gr.addColorStop(1,    'rgba(255,255,255,0)');
    g.fillStyle = gr;
    g.fillRect(0,0,S,S);

    // Diffraction spikes (4-pointed cross)
    g.globalCompositeOperation = 'lighter';
    const spike = (x1,y1,x2,y2, w) => {
        const sg = g.createLinearGradient(H,H, x1,y1);
        sg.addColorStop(0,   'rgba(255,255,255,0.22)');
        sg.addColorStop(0.5, 'rgba(255,255,255,0.06)');
        sg.addColorStop(1,   'rgba(255,255,255,0)');
        const sg2 = g.createLinearGradient(H,H, x2,y2);
        sg2.addColorStop(0,   'rgba(255,255,255,0.22)');
        sg2.addColorStop(0.5, 'rgba(255,255,255,0.06)');
        sg2.addColorStop(1,   'rgba(255,255,255,0)');
        g.save();
        g.lineWidth = w;
        g.strokeStyle = sg; g.beginPath(); g.moveTo(H,H); g.lineTo(x1,y1); g.stroke();
        g.strokeStyle = sg2; g.beginPath(); g.moveTo(H,H); g.lineTo(x2,y2); g.stroke();
        g.restore();
    };
    spike(0,H,  S,H,  2.5);  // horizontal
    spike(H,0,  H,S,  2.5);  // vertical
    spike(0,0,  S,S,  1.2);  // diagonal 1
    spike(S,0,  0,S,  1.2);  // diagonal 2

    return new THREE.CanvasTexture(c);
}

function galaxyParticleTex() {
    const S = 32;
    const c = document.createElement('canvas');
    c.width = c.height = S;
    const g = c.getContext('2d');
    const gr = g.createRadialGradient(S/2,S/2,0, S/2,S/2,S/2);
    gr.addColorStop(0,    'rgba(255,255,255,1)');
    gr.addColorStop(0.3,  'rgba(255,255,255,0.7)');
    gr.addColorStop(0.7,  'rgba(255,255,255,0.15)');
    gr.addColorStop(1,    'rgba(255,255,255,0)');
    g.fillStyle = gr;
    g.fillRect(0,0,S,S);
    return new THREE.CanvasTexture(c);
}

const STAR_TEX   = starTex();
const GALAXY_TEX = galaxyParticleTex();

// ─── BACKGROUND STAR FIELD ───────────────────────────────────────────────────
const STAR_PALETTE = [
    new THREE.Color(0.55,0.65,1.00),
    new THREE.Color(1.00,1.00,0.98),
    new THREE.Color(1.00,0.94,0.80),
    new THREE.Color(1.00,0.85,0.50),
    new THREE.Color(1.00,0.55,0.25),
    new THREE.Color(0.65,0.80,1.00),
    new THREE.Color(0.85,0.90,1.00),
];

function makeStarField(count, spread, sMin, sMax) {
    const pos  = new Float32Array(count * 3);
    const col  = new Float32Array(count * 3);
    const size = new Float32Array(count);
    for (let i = 0; i < count; i++) {
        const phi   = Math.acos(2 * Math.random() - 1);
        const theta = Math.random() * Math.PI * 2;
        const r     = Math.cbrt(Math.random()) * spread;
        pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
        pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        pos[i*3+2] = r * Math.cos(phi);
        const c = STAR_PALETTE[rndI(0, STAR_PALETTE.length)];
        const b = rnd(0.55, 1.0);
        col[i*3]=c.r*b; col[i*3+1]=c.g*b; col[i*3+2]=c.b*b;
        size[i] = rnd(sMin, sMax);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos,  3));
    geo.setAttribute('color',    new THREE.BufferAttribute(col,  3));
    geo.setAttribute('pSize',    new THREE.BufferAttribute(size, 1));

    const mat = new THREE.ShaderMaterial({
        uniforms: { tex: { value: STAR_TEX } },
        vertexShader: `
            attribute float pSize;
            attribute vec3 color;
            varying vec3 vCol;
            void main(){
                vCol = color;
                vec4 mv = modelViewMatrix * vec4(position,1.);
                gl_PointSize = pSize * (900. / -mv.z);
                gl_Position  = projectionMatrix * mv;
            }`,
        fragmentShader: `
            uniform sampler2D tex;
            varying vec3 vCol;
            void main(){
                vec4 t = texture2D(tex, gl_PointCoord);
                if(t.a < 0.01) discard;
                gl_FragColor = vec4(vCol * t.r, t.a);
            }`,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
    });
    return new THREE.Points(geo, mat);
}

scene.add(makeStarField(90000, 200000, 0.4, 2.2));
scene.add(makeStarField(18000,  35000, 0.8, 4.5));

// ─── GALAXY ──────────────────────────────────────────────────────────────────
const galaxyRegistry = [];

function createGalaxy(cfg) {
    const {
        name = 'Галактика',
        pos  = new THREE.Vector3(),
        type = 'spiral',
        radius   = 4000,
        arms     = 4,
        twist    = 4.5,
        n        = 80000,
        corCol   = new THREE.Color(1.0, 0.85, 0.45),
        armCol   = new THREE.Color(0.35, 0.55, 1.0),
        tilt     = 0,
    } = cfg;

    const positions = new Float32Array(n * 3);
    const colors    = new Float32Array(n * 3);
    const sizes     = new Float32Array(n);

    for (let i = 0; i < n; i++) {
        let x, y, z, col, sz;
        const rand = Math.random();

        if (type === 'spiral') {
            const zone = rand < 0.12 ? 'core'
                       : rand < 0.20 ? 'bulge'
                       : rand < 0.88 ? 'arm'
                       : 'halo';

            if (zone === 'core') {
                // Bright nucleus — very compact
                const r  = Math.pow(Math.random(), 2.5) * radius * 0.06;
                const th = Math.random() * Math.PI * 2;
                x = r * Math.cos(th);
                z = r * Math.sin(th);
                y = (Math.random() - .5) * r * 0.2;
                col = new THREE.Color(1, 0.95, 0.80);
                col.multiplyScalar(rnd(1.2, 2.0));
                sz = rnd(3, 9);

            } else if (zone === 'bulge') {
                // Wider spheroidal bulge
                const r  = Math.pow(Math.random(), 1.4) * radius * 0.18;
                const th = Math.random() * Math.PI * 2;
                const ph = Math.acos(2 * Math.random() - 1);
                x = r * Math.sin(ph) * Math.cos(th);
                z = r * Math.cos(ph);
                y = r * Math.sin(ph) * Math.sin(th) * 0.55;
                col = corCol.clone().lerp(new THREE.Color(1,0.9,0.7), rnd(0.3,0.7));
                col.multiplyScalar(rnd(0.7, 1.3));
                sz = rnd(1.5, 5);

            } else if (zone === 'arm') {
                // Detailed spiral arm with width falloff
                const arm      = rndI(0, arms);
                const angle    = (arm / arms) * Math.PI * 2;
                const r        = Math.pow(Math.random(), 0.4) * radius;
                const spiral   = angle + (r / radius) * twist * Math.PI;
                // Arm width narrows near core, widens at edges
                const armW     = rnd(0.04, 0.22) * (0.3 + r / radius);
                const scatter  = (Math.random() - 0.5) * r * armW * 2;
                x = (r + scatter) * Math.cos(spiral);
                z = (r + scatter) * Math.sin(spiral);
                // Thin disc, thicker in centre
                y = (Math.random() - .5) * radius * 0.03 * Math.max(0.1, 1 - r / radius * 0.8);

                const t = r / radius;
                // HII regions: random bright blue clumps along arms
                if (Math.random() < 0.04) {
                    col = new THREE.Color(0.5, 0.7, 1.0);
                    col.multiplyScalar(rnd(1.0, 1.8));
                    sz = rnd(2, 6);
                } else {
                    col = corCol.clone().lerp(armCol, Math.min(t, 1));
                    col.multiplyScalar(rnd(0.25, 1.15));
                    sz = rnd(0.4, 3.2);
                }

            } else {
                // Sparse stellar halo
                const r  = rnd(radius * 0.2, radius * 1.1);
                const th = Math.random() * Math.PI * 2;
                const ph = Math.acos(2 * Math.random() - 1);
                x = r * Math.sin(ph) * Math.cos(th);
                z = r * Math.cos(ph) * 0.4;
                y = r * Math.sin(ph) * Math.sin(th) * 0.15;
                col = corCol.clone().lerp(armCol, Math.random());
                col.multiplyScalar(rnd(0.1, 0.4));
                sz = rnd(0.3, 1.8);
            }

        } else if (type === 'elliptical') {
            const r  = Math.pow(Math.random(), 0.5) * radius;
            const th = Math.random() * Math.PI * 2;
            const ph = Math.acos(2 * Math.random() - 1);
            x = r * Math.sin(ph) * Math.cos(th);
            y = r * Math.sin(ph) * Math.sin(th) * 0.5;
            z = r * Math.cos(ph) * 0.85;
            col = corCol.clone().lerp(armCol, r / radius);
            col.multiplyScalar(rnd(0.5, 1.3));
            sz = rnd(0.5, 3.5);

        } else {
            // irregular
            const cx = rnd(-radius*.6, radius*.6);
            const cz = rnd(-radius*.6, radius*.6);
            x = cx + rnd(-radius*.4, radius*.4);
            z = cz + rnd(-radius*.4, radius*.4);
            y = (Math.random() - .5) * radius * 0.25;
            col = corCol.clone().lerp(armCol, Math.random());
            col.multiplyScalar(rnd(0.4, 1.1));
            sz = rnd(0.4, 3);
        }

        positions[i*3]=x; positions[i*3+1]=y; positions[i*3+2]=z;
        colors[i*3]=col.r; colors[i*3+1]=col.g; colors[i*3+2]=col.b;
        sizes[i] = sz;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(colors,    3));
    geo.setAttribute('pSize',    new THREE.BufferAttribute(sizes,     1));

    const mat = new THREE.ShaderMaterial({
        uniforms: { tex: { value: GALAXY_TEX } },
        vertexShader: `
            attribute float pSize;
            attribute vec3 color;
            varying vec3 vCol;
            void main(){
                vCol = color;
                vec4 mv = modelViewMatrix * vec4(position,1.);
                gl_PointSize = pSize * (1400. / -mv.z);
                gl_Position  = projectionMatrix * mv;
            }`,
        fragmentShader: `
            uniform sampler2D tex;
            varying vec3 vCol;
            void main(){
                vec4 t = texture2D(tex, gl_PointCoord);
                if(t.a < 0.005) discard;
                gl_FragColor = vec4(vCol * t.r, t.a);
            }`,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
    });

    const group = new THREE.Group();
    group.add(new THREE.Points(geo, mat));
    group.rotation.x = tilt;
    group.position.copy(pos);

    // Glowing core sphere
    const coreGeo = new THREE.SphereGeometry(radius * 0.022, 16, 16);
    const coreMat = new THREE.MeshBasicMaterial({ color: corCol });
    group.add(new THREE.Mesh(coreGeo, coreMat));

    scene.add(group);
    galaxyRegistry.push({ group, name, type, pos: pos.clone(), radius });
    return group;
}

// ─── NEBULA ──────────────────────────────────────────────────────────────────
const nebulaRegistry = [];

function createNebula(cfg) {
    const {
        name = 'Туманность',
        pos  = new THREE.Vector3(),
        radius = 700,
        n    = 18000,
        col1 = new THREE.Color(0.5,0.1,0.9),
        col2 = new THREE.Color(0.1,0.5,1.0),
    } = cfg;

    const positions = new Float32Array(n * 3);
    const colors    = new Float32Array(n * 3);
    const sizes     = new Float32Array(n);

    const clouds = Array.from({length:9}, () => ({
        x: rnd(-radius*.7, radius*.7),
        y: rnd(-radius*.25, radius*.25),
        z: rnd(-radius*.7, radius*.7),
        r: rnd(radius*.2, radius*.55),
    }));

    for (let i = 0; i < n; i++) {
        const cl   = clouds[rndI(0, clouds.length)];
        const ph   = Math.acos(2*Math.random()-1);
        const th   = Math.random() * Math.PI * 2;
        const r    = Math.pow(Math.random(), 0.55) * cl.r;
        positions[i*3]   = cl.x + r*Math.sin(ph)*Math.cos(th);
        positions[i*3+1] = cl.y + r*Math.sin(ph)*Math.sin(th)*0.35;
        positions[i*3+2] = cl.z + r*Math.cos(ph);
        const c = col1.clone().lerp(col2, Math.random());
        c.multiplyScalar(rnd(0.5, 1.3));
        colors[i*3]=c.r; colors[i*3+1]=c.g; colors[i*3+2]=c.b;
        sizes[i] = rnd(6, 28);
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(colors,    3));
    geo.setAttribute('pSize',    new THREE.BufferAttribute(sizes,     1));

    const mat = new THREE.ShaderMaterial({
        uniforms: { tex: { value: GALAXY_TEX } },
        vertexShader: `
            attribute float pSize;
            attribute vec3 color;
            varying vec3 vCol;
            void main(){
                vCol = color;
                vec4 mv = modelViewMatrix * vec4(position,1.);
                gl_PointSize = pSize * (1800. / -mv.z);
                gl_Position  = projectionMatrix * mv;
            }`,
        fragmentShader: `
            uniform sampler2D tex;
            varying vec3 vCol;
            void main(){
                vec4 t = texture2D(tex, gl_PointCoord);
                float a = t.a * 0.4;
                if(a < 0.003) discard;
                gl_FragColor = vec4(vCol * t.r, a);
            }`,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
    });

    const pts = new THREE.Points(geo, mat);
    pts.position.copy(pos);
    scene.add(pts);
    nebulaRegistry.push({ pts, name, pos: pos.clone(), radius });
}

function addBrightStar(pos, col, r) {
    const m = new THREE.MeshBasicMaterial({ color: col });
    const s = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 12), m);
    s.position.copy(pos);
    scene.add(s);
    const halo = new THREE.Mesh(
        new THREE.SphereGeometry(r * 4, 12, 12),
        new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.1 })
    );
    halo.position.copy(pos);
    scene.add(halo);
}

// ─── CONTROLS ────────────────────────────────────────────────────────────────
const keys = {};

document.addEventListener('keyup',   e => { keys[e.code] = false; });

let yaw = 0, pitch = 0;
let locked = false;
const euler = new THREE.Euler(0,0,0,'YXZ');

renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange', () => {
    locked = document.pointerLockElement === renderer.domElement;
    document.getElementById('hint').style.opacity = locked ? '0' : '1';
});
document.addEventListener('mousemove', e => {
    if (!locked) return;
    yaw   -= e.movementX * 0.0018;
    pitch -= e.movementY * 0.0018;
    pitch  = Math.max(-Math.PI/2+.01, Math.min(Math.PI/2-.01, pitch));
});

// ─── MOBILE / TOUCH ──────────────────────────────────────────────────────────
const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

// Virtual joystick state
const joyState = { active: false, id: -1, ox: 0, oy: 0, dx: 0, dy: 0 };
let   touchBoost = false;

if (isMobile) {
    // Show mobile UI, hide desktop hints
    document.getElementById('hint').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    document.getElementById('touch-look').style.display = 'block';
    document.getElementById('joystick-zone').style.display = 'flex';
    document.getElementById('boost-btn').style.display = 'flex';

    const joyZone  = document.getElementById('joystick-zone');
    const joyRing  = document.getElementById('joystick-ring');
    const joyDot   = document.getElementById('joystick-dot');
    const lookZone = document.getElementById('touch-look');
    const boostBtn = document.getElementById('boost-btn');
    const JR = 55; // joystick radius in px

    // ── JOYSTICK ────────────────────────────────────────────────────────────
    joyZone.addEventListener('touchstart', e => {
        e.preventDefault();
        const t = e.changedTouches[0];
        const rect = joyRing.getBoundingClientRect();
        joyState.active = true;
        joyState.id = t.identifier;
        joyState.ox = rect.left + rect.width / 2;
        joyState.oy = rect.top  + rect.height / 2;
    }, { passive: false });

    function updateJoy(touches) {
        for (const t of touches) {
            if (t.identifier !== joyState.id) continue;
            let dx = t.clientX - joyState.ox;
            let dy = t.clientY - joyState.oy;
            const len = Math.sqrt(dx*dx + dy*dy);
            if (len > JR) { dx = dx/len*JR; dy = dy/len*JR; }
            joyState.dx = dx / JR;
            joyState.dy = dy / JR;
            joyDot.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        }
    }
    function releaseJoy(touches) {
        for (const t of touches) {
            if (t.identifier !== joyState.id) continue;
            joyState.active = false;
            joyState.dx = 0; joyState.dy = 0;
            joyDot.style.transform = 'translate(-50%,-50%)';
        }
    }
    joyZone.addEventListener('touchmove',   e => { e.preventDefault(); updateJoy(e.changedTouches); }, { passive: false });
    joyZone.addEventListener('touchend',    e => releaseJoy(e.changedTouches));
    joyZone.addEventListener('touchcancel', e => releaseJoy(e.changedTouches));

    // ── LOOK (right area) ───────────────────────────────────────────────────
    const lookTouches = new Map();
    lookZone.addEventListener('touchstart', e => {
        e.preventDefault();
        for (const t of e.changedTouches) {
            // ignore touches in joystick zone (left 48%)
            if (t.clientX < window.innerWidth * 0.48) continue;
            lookTouches.set(t.identifier, { x: t.clientX, y: t.clientY });
        }
    }, { passive: false });
    lookZone.addEventListener('touchmove', e => {
        e.preventDefault();
        for (const t of e.changedTouches) {
            const prev = lookTouches.get(t.identifier);
            if (!prev) continue;
            yaw   -= (t.clientX - prev.x) * 0.004;
            pitch -= (t.clientY - prev.y) * 0.004;
            pitch  = Math.max(-Math.PI/2+.01, Math.min(Math.PI/2-.01, pitch));
            lookTouches.set(t.identifier, { x: t.clientX, y: t.clientY });
        }
    }, { passive: false });
    lookZone.addEventListener('touchend',    e => { for (const t of e.changedTouches) lookTouches.delete(t.identifier); });
    lookZone.addEventListener('touchcancel', e => { for (const t of e.changedTouches) lookTouches.delete(t.identifier); });

    // ── BOOST BUTTON ────────────────────────────────────────────────────────
    boostBtn.addEventListener('touchstart', e => { e.preventDefault(); touchBoost = true; boostBtn.classList.add('active'); }, { passive: false });
    boostBtn.addEventListener('touchend',   e => { touchBoost = false; boostBtn.classList.remove('active'); });
    boostBtn.addEventListener('touchcancel',e => { touchBoost = false; boostBtn.classList.remove('active'); });
}

// ─── HUD REFS ────────────────────────────────────────────────────────────────
const $speed   = document.getElementById('speed');
const $posX    = document.getElementById('posX');
const $posY    = document.getElementById('posY');
const $posZ    = document.getElementById('posZ');
const $objCnt  = document.getElementById('objCount');
const $nName   = document.getElementById('nearestName');
const $nDist   = document.getElementById('nearestDist');
const $nType   = document.getElementById('nearestType');

$objCnt.textContent = galaxyRegistry.length + nebulaRegistry.length;

// ─── PHYSICS ─────────────────────────────────────────────────────────────────
const velocity = new THREE.Vector3();
let   speed    = 0;

// ─── ANIMATE ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let hudTimer = 0;

function updateNearest() {
    let best = null, bestD = Infinity;
    for (const g of galaxyRegistry) {
        const d = camera.position.distanceTo(g.pos);
        if (d < bestD) { bestD = d; best = { name: g.name, type: 'галактика', d }; }
    }
    for (const n of nebulaRegistry) {
        const d = camera.position.distanceTo(n.pos);
        if (d < bestD) { bestD = d; best = { name: n.name, type: 'туманность', d }; }
    }
    if (best) {
        $nName.textContent = best.name;
        $nDist.textContent = (best.d / 1000).toFixed(1) + ' кпк';
        $nType.textContent = best.type;
    }
}

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    hudTimer += dt;

    // Camera orientation
    euler.set(pitch, yaw, 0);
    camera.quaternion.setFromEuler(euler);

    // Movement
    const fast = keys['ShiftLeft'] || keys['ShiftRight'] || touchBoost;
    const spd  = fast ? 3500 : 280;

    const fwd   = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    const right = new THREE.Vector3(1,0, 0).applyQuaternion(camera.quaternion);
    const up    = new THREE.Vector3(0,1, 0);

    const move = new THREE.Vector3();
    if (keys['KeyW'] || keys['ArrowUp'])     move.add(fwd);
    if (keys['KeyS'] || keys['ArrowDown'])   move.sub(fwd);
    if (keys['KeyA'] || keys['ArrowLeft'])   move.sub(right);
    if (keys['KeyD'] || keys['ArrowRight'])  move.add(right);
    if (keys['KeyQ'] || keys['Space'])       move.add(up);
    if (keys['KeyE'] || keys['ControlLeft']) move.sub(up);

    // Virtual joystick: dy = forward/back, dx = strafe
    if (joyState.active) {
        if (Math.abs(joyState.dy) > 0.08) {
            if (joyState.dy < 0) move.add(fwd.clone().multiplyScalar(-joyState.dy));
            else                 move.sub(fwd.clone().multiplyScalar( joyState.dy));
        }
        if (Math.abs(joyState.dx) > 0.08) {
            if (joyState.dx > 0) move.add(right.clone().multiplyScalar( joyState.dx));
            else                 move.sub(right.clone().multiplyScalar(-joyState.dx));
        }
    }

    const target = move.lengthSq() > 0
        ? move.normalize().multiplyScalar(spd)
        : new THREE.Vector3();
    velocity.lerp(target, dt * 3.5);

    camera.position.addScaledVector(velocity, dt);
    speed = velocity.length() / 100;

    // Slowly rotate galaxies for life
    for (const g of galaxyRegistry) g.group.rotation.y += dt * 0.004;

    // HUD (update every 3 frames)
    if (hudTimer > 0.05) {
        hudTimer = 0;
        $speed.textContent = speed.toFixed(1);
        $posX.textContent  = (camera.position.x / 1000).toFixed(2) + ' кпк';
        $posY.textContent  = (camera.position.y / 1000).toFixed(2) + ' кпк';
        $posZ.textContent  = (camera.position.z / 1000).toFixed(2) + ' кпк';
        updateNearest();
    }

    composer.render();
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});

// Hide loading screen
setTimeout(() => {
    const el = document.getElementById('loading');
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 1200);
}, 1800);

animate();
</script>
