<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космический Исследователь</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }

        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(100, 200, 255, 0.85);
            font-size: 13px;
            text-shadow: 0 0 8px rgba(100, 200, 255, 0.4);
            pointer-events: none;
            user-select: none;
        }
        #hud h1 {
            font-size: 16px;
            letter-spacing: 4px;
            margin-bottom: 14px;
            color: rgba(160, 230, 255, 1);
            text-shadow: 0 0 15px rgba(100, 200, 255, 0.7);
        }
        .hud-line { margin: 3px 0; }
        .hud-val { color: rgba(200, 240, 255, 1); }

        #nearest {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 190, 80, 0.85);
            font-size: 12px;
            text-align: right;
            pointer-events: none;
            user-select: none;
            text-shadow: 0 0 8px rgba(255, 180, 60, 0.4);
        }
        #nearestName { font-size: 15px; margin-top: 4px; color: rgba(255, 210, 120, 1); }
        #nearestDist { margin-top: 2px; }
        #nearestType { opacity: 0.6; font-size: 11px; margin-top: 2px; }

        #controls {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(100, 180, 255, 0.5);
            font-size: 11px;
            text-align: center;
            pointer-events: none;
            user-select: none;
            letter-spacing: 1px;
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            width: 24px;
            height: 24px;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(100, 200, 255, 0.5);
            box-shadow: 0 0 4px rgba(100, 200, 255, 0.4);
        }
        #crosshair::before { width: 24px; height: 1px; top: 11px; left: 0; }
        #crosshair::after  { width: 1px; height: 24px; top: 0; left: 11px; }

        #hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(100, 200, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
            letter-spacing: 2px;
            transition: opacity 0.8s;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(100, 200, 255, 0.9);
            z-index: 100;
            transition: opacity 1.2s;
        }
        #loading h1 {
            font-size: 32px;
            letter-spacing: 10px;
            margin-bottom: 12px;
            text-shadow: 0 0 25px rgba(100, 200, 255, 0.8);
        }
        #loading p { letter-spacing: 3px; opacity: 0.5; font-size: 12px; margin-bottom: 30px; }
        .bar { width: 260px; height: 1px; background: rgba(100,200,255,0.15); position: relative; overflow: hidden; }
        .bar-fill {
            position: absolute; top: 0; left: 0; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(100,200,255,0.9), transparent);
            animation: sweep 1.4s linear infinite;
        }
        @keyframes sweep { from { transform: translateX(-100%); } to { transform: translateX(400%); } }
    </style>
</head>
<body>

<div id="loading">
    <h1>КОСМОС</h1>
    <p>ЗАГРУЗКА ВСЕЛЕННОЙ...</p>
    <div class="bar"><div class="bar-fill"></div></div>
</div>

<div id="hud">
    <h1>★ КОСМИЧЕСКИЙ НАВИГАТОР</h1>
    <div class="hud-line">СКОРОСТЬ: <span class="hud-val" id="speed">0.0</span> пк/с</div>
    <div class="hud-line">X <span class="hud-val" id="posX">0</span></div>
    <div class="hud-line">Y <span class="hud-val" id="posY">0</span></div>
    <div class="hud-line">Z <span class="hud-val" id="posZ">0</span></div>
    <div class="hud-line" style="margin-top:10px">ОБЪЕКТОВ: <span class="hud-val" id="objCount">0</span></div>
</div>

<div id="nearest">
    <div style="letter-spacing:2px;font-size:10px">БЛИЖАЙШИЙ ОБЪЕКТ</div>
    <div id="nearestName">—</div>
    <div id="nearestDist">—</div>
    <div id="nearestType">—</div>
</div>

<div id="crosshair"></div>

<div id="hint">НАЖМИ ДЛЯ ЗАХВАТА МЫШИ</div>

<div id="controls">
    WASD / СТРЕЛКИ — Движение &nbsp;|&nbsp; МЫШЬ — Поворот &nbsp;|&nbsp; SHIFT — Ускорение ×10 &nbsp;|&nbsp; Q/E — Вверх/Вниз
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

// ─── RENDERER ────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
document.body.appendChild(renderer.domElement);

// ─── SCENE / CAMERA ──────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.5, 400000);
camera.position.set(0, 500, 3000);

// ─── POST-PROCESSING ─────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    1.6,   // strength
    0.5,   // radius
    0.08   // threshold (low → lots of bloom)
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ─── UTILS ───────────────────────────────────────────────────────────────────
const rnd  = (a, b) => a + Math.random() * (b - a);
const rndI = (a, b) => Math.floor(rnd(a, b));

function starTex() {
    const c = document.createElement('canvas');
    c.width = c.height = 64;
    const g = c.getContext('2d');
    const gr = g.createRadialGradient(32,32,0, 32,32,32);
    gr.addColorStop(0,   'rgba(255,255,255,1)');
    gr.addColorStop(0.15,'rgba(255,255,255,0.9)');
    gr.addColorStop(1,   'rgba(255,255,255,0)');
    g.fillStyle = gr;
    g.fillRect(0,0,64,64);
    return new THREE.CanvasTexture(c);
}
const STAR_TEX = starTex();

// ─── BACKGROUND STAR FIELD ───────────────────────────────────────────────────
const STAR_PALETTE = [
    new THREE.Color(0.55,0.65,1.00),
    new THREE.Color(1.00,1.00,0.98),
    new THREE.Color(1.00,0.94,0.80),
    new THREE.Color(1.00,0.85,0.50),
    new THREE.Color(1.00,0.55,0.25),
    new THREE.Color(0.65,0.80,1.00),
    new THREE.Color(0.85,0.90,1.00),
];

function makeStarField(count, spread, sMin, sMax) {
    const pos  = new Float32Array(count * 3);
    const col  = new Float32Array(count * 3);
    const size = new Float32Array(count);
    for (let i = 0; i < count; i++) {
        const phi   = Math.acos(2 * Math.random() - 1);
        const theta = Math.random() * Math.PI * 2;
        const r     = Math.cbrt(Math.random()) * spread;
        pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
        pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        pos[i*3+2] = r * Math.cos(phi);
        const c = STAR_PALETTE[rndI(0, STAR_PALETTE.length)];
        const b = rnd(0.55, 1.0);
        col[i*3]=c.r*b; col[i*3+1]=c.g*b; col[i*3+2]=c.b*b;
        size[i] = rnd(sMin, sMax);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos,  3));
    geo.setAttribute('color',    new THREE.BufferAttribute(col,  3));
    geo.setAttribute('pSize',    new THREE.BufferAttribute(size, 1));

    const mat = new THREE.ShaderMaterial({
        uniforms: { tex: { value: STAR_TEX } },
        vertexShader: `
            attribute float pSize;
            varying vec3 vCol;
            void main(){
                vCol = color;
                vec4 mv = modelViewMatrix * vec4(position,1.);
                gl_PointSize = pSize * (900. / -mv.z);
                gl_Position  = projectionMatrix * mv;
            }`,
        fragmentShader: `
            varying vec3 vCol;
            void main(){
                vec2 uv = gl_PointCoord - .5;
                float d = length(uv)*2.;
                float a = exp(-d*d*3.5);
                if(a<.01) discard;
                gl_FragColor = vec4(vCol, a);
            }`,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
        vertexColors: false,
    });
    return new THREE.Points(geo, mat);
}

scene.add(makeStarField(90000, 200000, 0.4, 2.2));
scene.add(makeStarField(18000,  35000, 0.8, 4.5));

// ─── GALAXY ──────────────────────────────────────────────────────────────────
const galaxyRegistry = [];

function createGalaxy(cfg) {
    const {
        name = 'Галактика',
        pos  = new THREE.Vector3(),
        type = 'spiral',
        radius   = 4000,
        arms     = 4,
        twist    = 4.5,
        n        = 80000,
        corCol   = new THREE.Color(1.0, 0.85, 0.45),
        armCol   = new THREE.Color(0.35, 0.55, 1.0),
        tilt     = 0,
    } = cfg;

    const positions = new Float32Array(n * 3);
    const colors    = new Float32Array(n * 3);
    const sizes     = new Float32Array(n);

    for (let i = 0; i < n; i++) {
        let x, y, z, col, sz;
        const rand = Math.random();

        if (type === 'spiral') {
            if (rand < 0.14) {
                // dense core
                const r  = Math.pow(Math.random(), 1.8) * radius * 0.14;
                const th = Math.random() * Math.PI * 2;
                x = r * Math.cos(th);
                z = r * Math.sin(th);
                y = (Math.random() - .5) * r * 0.25;
                col = corCol.clone().lerp(new THREE.Color(1,1,0.9), Math.random());
                col.multiplyScalar(rnd(0.9, 1.6));
                sz = rnd(2, 7);
            } else {
                // arm
                const arm    = rndI(0, arms);
                const angle  = (arm / arms) * Math.PI * 2;
                const r      = Math.pow(Math.random(), 0.45) * radius;
                const spiral = angle + (r / radius) * twist * Math.PI;
                const scatter = rnd(-0.35, 0.35) * r * 0.5;
                x = (r + scatter) * Math.cos(spiral);
                z = (r + scatter) * Math.sin(spiral);
                y = (Math.random() - .5) * radius * 0.04 * (1 - r / radius);
                const t = r / radius;
                col = corCol.clone().lerp(armCol, Math.min(t * 0.9, 1));
                col.multiplyScalar(rnd(0.3, 1.2));
                sz = rnd(0.4, 3.8);
            }

        } else if (type === 'elliptical') {
            const r  = Math.pow(Math.random(), 0.5) * radius;
            const th = Math.random() * Math.PI * 2;
            const ph = Math.acos(2 * Math.random() - 1);
            x = r * Math.sin(ph) * Math.cos(th);
            y = r * Math.sin(ph) * Math.sin(th) * 0.5;
            z = r * Math.cos(ph) * 0.85;
            col = corCol.clone().lerp(armCol, r / radius);
            col.multiplyScalar(rnd(0.5, 1.2));
            sz = rnd(0.5, 3.5);

        } else {
            // irregular
            const cx = rnd(-radius*.6, radius*.6);
            const cz = rnd(-radius*.6, radius*.6);
            x = cx + rnd(-radius*.4, radius*.4);
            z = cz + rnd(-radius*.4, radius*.4);
            y = (Math.random() - .5) * radius * 0.25;
            col = corCol.clone().lerp(armCol, Math.random());
            col.multiplyScalar(rnd(0.4, 1.1));
            sz = rnd(0.4, 3);
        }

        positions[i*3]=x; positions[i*3+1]=y; positions[i*3+2]=z;
        colors[i*3]=col.r; colors[i*3+1]=col.g; colors[i*3+2]=col.b;
        sizes[i] = sz;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(colors,    3));
    geo.setAttribute('pSize',    new THREE.BufferAttribute(sizes,     1));

    const mat = new THREE.ShaderMaterial({
        vertexShader: `
            attribute float pSize;
            varying vec3 vCol;
            void main(){
                vCol = color;
                vec4 mv = modelViewMatrix * vec4(position,1.);
                gl_PointSize = pSize * (1400. / -mv.z);
                gl_Position  = projectionMatrix * mv;
            }`,
        fragmentShader: `
            varying vec3 vCol;
            void main(){
                vec2 uv = gl_PointCoord - .5;
                float d = length(uv)*2.;
                float a = exp(-d*d*2.8) * (1.-smoothstep(.75,1.,d));
                if(a<.008) discard;
                gl_FragColor = vec4(vCol, a);
            }`,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
        vertexColors: true,
    });

    const group = new THREE.Group();
    group.add(new THREE.Points(geo, mat));
    group.rotation.x = tilt;
    group.position.copy(pos);

    // Glowing core sphere
    const coreGeo = new THREE.SphereGeometry(radius * 0.022, 16, 16);
    const coreMat = new THREE.MeshBasicMaterial({ color: corCol });
    group.add(new THREE.Mesh(coreGeo, coreMat));

    scene.add(group);
    galaxyRegistry.push({ group, name, type, pos: pos.clone(), radius });
    return group;
}

// ─── NEBULA ──────────────────────────────────────────────────────────────────
const nebulaRegistry = [];

function createNebula(cfg) {
    const {
        name = 'Туманность',
        pos  = new THREE.Vector3(),
        radius = 700,
        n    = 18000,
        col1 = new THREE.Color(0.5,0.1,0.9),
        col2 = new THREE.Color(0.1,0.5,1.0),
    } = cfg;

    const positions = new Float32Array(n * 3);
    const colors    = new Float32Array(n * 3);
    const sizes     = new Float32Array(n);

    const clouds = Array.from({length:9}, () => ({
        x: rnd(-radius*.7, radius*.7),
        y: rnd(-radius*.25, radius*.25),
        z: rnd(-radius*.7, radius*.7),
        r: rnd(radius*.2, radius*.55),
    }));

    for (let i = 0; i < n; i++) {
        const cl   = clouds[rndI(0, clouds.length)];
        const ph   = Math.acos(2*Math.random()-1);
        const th   = Math.random() * Math.PI * 2;
        const r    = Math.pow(Math.random(), 0.55) * cl.r;
        positions[i*3]   = cl.x + r*Math.sin(ph)*Math.cos(th);
        positions[i*3+1] = cl.y + r*Math.sin(ph)*Math.sin(th)*0.35;
        positions[i*3+2] = cl.z + r*Math.cos(ph);
        const c = col1.clone().lerp(col2, Math.random());
        c.multiplyScalar(rnd(0.5, 1.3));
        colors[i*3]=c.r; colors[i*3+1]=c.g; colors[i*3+2]=c.b;
        sizes[i] = rnd(6, 28);
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(colors,    3));
    geo.setAttribute('pSize',    new THREE.BufferAttribute(sizes,     1));

    const mat = new THREE.ShaderMaterial({
        vertexShader: `
            attribute float pSize;
            varying vec3 vCol;
            void main(){
                vCol = color;
                vec4 mv = modelViewMatrix * vec4(position,1.);
                gl_PointSize = pSize * (1800. / -mv.z);
                gl_Position  = projectionMatrix * mv;
            }`,
        fragmentShader: `
            varying vec3 vCol;
            void main(){
                vec2 uv = gl_PointCoord - .5;
                float d = length(uv)*2.;
                float a = exp(-d*d*1.4) * 0.45;
                if(a<.004) discard;
                gl_FragColor = vec4(vCol, a);
            }`,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        transparent: true,
        vertexColors: true,
    });

    const pts = new THREE.Points(geo, mat);
    pts.position.copy(pos);
    scene.add(pts);
    nebulaRegistry.push({ pts, name, pos: pos.clone(), radius });
}

// ─── BRIGHT NEARBY STARS ─────────────────────────────────────────────────────
function addBrightStar(pos, col, r) {
    const m = new THREE.MeshBasicMaterial({ color: col });
    const s = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 12), m);
    s.position.copy(pos);
    scene.add(s);
    const halo = new THREE.Mesh(
        new THREE.SphereGeometry(r * 4, 12, 12),
        new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.1 })
    );
    halo.position.copy(pos);
    scene.add(halo);
}

// ─── POPULATE UNIVERSE ───────────────────────────────────────────────────────

// Milky Way (player is inside/near it)
createGalaxy({
    name:'Млечный Путь',
    pos: new THREE.Vector3(0,0,0),
    type:'spiral', radius:9000, arms:4, twist:5, n:130000,
    corCol: new THREE.Color(1.0, 0.85, 0.45),
    armCol: new THREE.Color(0.35, 0.55, 1.0),
    tilt: Math.PI * 0.08,
});

// Andromeda
createGalaxy({
    name:'Галактика Андромеды (M31)',
    pos: new THREE.Vector3(32000, 5500, -16000),
    type:'spiral', radius:10000, arms:2, twist:3.5, n:110000,
    corCol: new THREE.Color(1.0, 0.92, 0.72),
    armCol: new THREE.Color(0.45, 0.65, 1.0),
    tilt: Math.PI * 0.28,
});

// Triangulum M33
createGalaxy({
    name:'Галактика Треугольника (M33)',
    pos: new THREE.Vector3(20000, -3500, -26000),
    type:'spiral', radius:4500, arms:3, twist:4.2, n:65000,
    corCol: new THREE.Color(0.9, 0.82, 0.62),
    armCol: new THREE.Color(0.28, 0.48, 0.95),
    tilt: Math.PI * 0.18,
});

// Whirlpool M51
createGalaxy({
    name:'Водоворот (M51)',
    pos: new THREE.Vector3(-27000, 9000, -42000),
    type:'spiral', radius:5500, arms:2, twist:6.5, n:75000,
    corCol: new THREE.Color(1.0, 0.72, 0.30),
    armCol: new THREE.Color(0.18, 0.48, 1.0),
    tilt: Math.PI * 0.04,
});

// Sombrero M104
createGalaxy({
    name:'Сомбреро (M104)',
    pos: new THREE.Vector3(43000, -13000, 12000),
    type:'elliptical', radius:6500, n:55000,
    corCol: new THREE.Color(1.0, 0.88, 0.62),
    armCol: new THREE.Color(0.7, 0.55, 0.30),
    tilt: Math.PI * 0.52,
});

// Large Magellanic Cloud
createGalaxy({
    name:'Большое Магелланово Облако',
    pos: new THREE.Vector3(-9000, -6500, 5500),
    type:'irregular', radius:3200, n:42000,
    corCol: new THREE.Color(0.82, 0.72, 1.0),
    armCol: new THREE.Color(0.38, 0.60, 1.0),
});

// Small Magellanic Cloud
createGalaxy({
    name:'Малое Магелланово Облако',
    pos: new THREE.Vector3(-6500, -5200, 7200),
    type:'irregular', radius:1600, n:26000,
    corCol: new THREE.Color(0.72, 0.82, 1.0),
    armCol: new THREE.Color(0.48, 0.70, 1.0),
});

// Distant galaxy cluster
const distGalDefs = [
    { name:'NGC 4889', col1: new THREE.Color(1,.85,.5), col2: new THREE.Color(.4,.6,1) },
    { name:'NGC 1300', col1: new THREE.Color(1,.75,.3), col2: new THREE.Color(.2,.5,1) },
    { name:'NGC 5128 (Центавр А)', col1: new THREE.Color(.9,.7,.5), col2: new THREE.Color(.5,.3,.8) },
    { name:'NGC 4038 (Антенны)', col1: new THREE.Color(1,.6,.2), col2: new THREE.Color(.3,.7,1) },
    { name:'IC 1101', col1: new THREE.Color(1,.9,.7), col2: new THREE.Color(.6,.5,.3) },
    { name:'NGC 1232', col1: new THREE.Color(.9,.8,.5), col2: new THREE.Color(.3,.55,.95) },
    { name:'NGC 6946', col1: new THREE.Color(1,.7,.3), col2: new THREE.Color(.2,.6,.9) },
    { name:'NGC 7331', col1: new THREE.Color(.85,.8,.6), col2: new THREE.Color(.4,.6,1) },
];
distGalDefs.forEach((gd, i) => {
    const angle = (i / distGalDefs.length) * Math.PI * 2;
    const dist  = rnd(65000, 95000);
    createGalaxy({
        name: gd.name,
        pos: new THREE.Vector3(
            Math.cos(angle)*dist + rnd(-8000,8000),
            rnd(-18000,18000),
            Math.sin(angle)*dist + rnd(-8000,8000)
        ),
        type: ['spiral','spiral','elliptical','irregular'][rndI(0,4)],
        radius: rnd(2200, 7000),
        arms: rndI(2,5), twist: rnd(2,7), n: 42000,
        corCol: gd.col1, armCol: gd.col2,
        tilt: Math.random() * Math.PI,
    });
});

// Nebulae
createNebula({
    name:'Крабовидная туманность (M1)',
    pos: new THREE.Vector3(2200, 900, -1700),
    radius:900, n:22000,
    col1: new THREE.Color(1.0, 0.28, 0.08),
    col2: new THREE.Color(0.82, 0.08, 0.55),
});
createNebula({
    name:'Туманность Ориона (M42)',
    pos: new THREE.Vector3(-3200, -600, 2100),
    radius:1300, n:28000,

// ─── CONTROLS ────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

let yaw = 0, pitch = 0;
let locked = false;
const euler = new THREE.Euler(0,0,0,'YXZ');

renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange', () => {
    locked = document.pointerLockElement === renderer.domElement;
    document.getElementById('hint').style.opacity = locked ? '0' : '1';
});
document.addEventListener('mousemove', e => {
    if (!locked) return;
    yaw   -= e.movementX * 0.0018;
    pitch -= e.movementY * 0.0018;
    pitch  = Math.max(-Math.PI/2+.01, Math.min(Math.PI/2-.01, pitch));
});

// ─── HUD REFS ────────────────────────────────────────────────────────────────
const $speed   = document.getElementById('speed');
const $posX    = document.getElementById('posX');
const $posY    = document.getElementById('posY');
const $posZ    = document.getElementById('posZ');
const $objCnt  = document.getElementById('objCount');
const $nName   = document.getElementById('nearestName');
const $nDist   = document.getElementById('nearestDist');
const $nType   = document.getElementById('nearestType');

$objCnt.textContent = galaxyRegistry.length + nebulaRegistry.length;

// ─── PHYSICS ─────────────────────────────────────────────────────────────────
const velocity = new THREE.Vector3();
let   speed    = 0;

// ─── ANIMATE ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let hudTimer = 0;

function updateNearest() {
    let best = null, bestD = Infinity;
    for (const g of galaxyRegistry) {
        const d = camera.position.distanceTo(g.pos);
        if (d < bestD) { bestD = d; best = { name: g.name, type: 'галактика', d }; }
    }
    for (const n of nebulaRegistry) {
        const d = camera.position.distanceTo(n.pos);
        if (d < bestD) { bestD = d; best = { name: n.name, type: 'туманность', d }; }
    }
    if (best) {
        $nName.textContent = best.name;
        $nDist.textContent = (best.d / 1000).toFixed(1) + ' кпк';
        $nType.textContent = best.type;
    }
}

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    hudTimer += dt;

    // Camera orientation
    euler.set(pitch, yaw, 0);
    camera.quaternion.setFromEuler(euler);

    // Movement
    const fast = keys['ShiftLeft'] || keys['ShiftRight'];
    const spd  = fast ? 3500 : 280;

    const fwd   = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
    const right = new THREE.Vector3(1,0, 0).applyQuaternion(camera.quaternion);
    const up    = new THREE.Vector3(0,1, 0);

    const move = new THREE.Vector3();
    if (keys['KeyW'] || keys['ArrowUp'])    move.add(fwd);
    if (keys['KeyS'] || keys['ArrowDown'])  move.sub(fwd);
    if (keys['KeyA'] || keys['ArrowLeft'])  move.sub(right);
    if (keys['KeyD'] || keys['ArrowRight']) move.add(right);
    if (keys['KeyQ'] || keys['Space'])      move.add(up);
    if (keys['KeyE'] || keys['ControlLeft']) move.sub(up);

    const target = move.lengthSq() > 0
        ? move.normalize().multiplyScalar(spd)
        : new THREE.Vector3();
    velocity.lerp(target, dt * 3.5);

    camera.position.addScaledVector(velocity, dt);
    speed = velocity.length() / 100;

    // Slowly rotate galaxies for life
    for (const g of galaxyRegistry) g.group.rotation.y += dt * 0.004;

    // HUD (update every 3 frames)
    if (hudTimer > 0.05) {
        hudTimer = 0;
        $speed.textContent = speed.toFixed(1);
        $posX.textContent  = (camera.position.x / 1000).toFixed(2) + ' кпк';
        $posY.textContent  = (camera.position.y / 1000).toFixed(2) + ' кпк';
        $posZ.textContent  = (camera.position.z / 1000).toFixed(2) + ' кпк';
        updateNearest();
    }

    composer.render();
}

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});

// Hide loading screen
setTimeout(() => {
    const el = document.getElementById('loading');
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 1200);
}, 1800);

animate();
</script>
