<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block}
#hud{position:fixed;top:20px;left:20px;color:rgba(100,200,255,.85);font-size:12px;text-shadow:0 0 8px rgba(100,200,255,.4);pointer-events:none;user-select:none;z-index:20}

#infoCard{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,8,28,.82);border:1px solid rgba(100,200,255,.18);backdrop-filter:blur(12px);padding:14px 22px;border-radius:3px;color:rgba(180,230,255,.9);max-width:400px;text-align:center;pointer-events:none;z-index:20;opacity:0;transition:opacity .7s;font-size:11px;line-height:1.6}

#tourBtn,#timeBtn,#audioBtn{position:fixed;bottom:48px;font-family:'Courier New',monospace;font-size:10px;letter-spacing:2px;padding:7px 12px;cursor:pointer;z-index:20;border-radius:2px;border:1px solid;transition:background .2s}
#tourBtn{right:18px;background:rgba(0,18,55,.7);border-color:rgba(100,200,255,.3);color:rgba(100,200,255,.9)}

#controls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(100,180,255,.4);font-size:10px;text-align:center;pointer-events:none;user-select:none;letter-spacing:1px;z-index:20}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;width:20px;height:20px;z-index:20}

#crosshair::before{width:20px;height:1px;top:9px;left:0}

#hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(100,200,255,.7);font-size:13px;text-align:center;pointer-events:none;letter-spacing:2px;transition:opacity .8s;z-index:20}
#loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(100,200,255,.9);z-index:100;transition:opacity 1.2s}
#loading h1{font-size:28px;letter-spacing:10px;margin-bottom:10px;text-shadow:0 0 25px rgba(100,200,255,.8)}
#loading p{letter-spacing:3px;opacity:.5;font-size:11px;margin-bottom:26px}
.bar{width:240px;height:1px;background:rgba(100,200,255,.15);position:relative;overflow:hidden}
.bar-fill{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(100,200,255,.9),transparent);animation:sweep 1.4s linear infinite}
@keyframes sweep{from{transform:translateX(-100%)}to{transform:translateX(400%)}}
#touch-look{position:fixed;inset:0;display:none;touch-action:none;z-index:5}
#joystick-zone{position:fixed;left:0;bottom:0;width:48%;height:55%;display:none;align-items:flex-end;justify-content:flex-start;padding:26px;touch-action:none;z-index:10}
#joystick-ring{width:100px;height:100px;border:1.5px solid rgba(100,200,255,.3);border-radius:50%;position:relative;background:rgba(100,200,255,.04);flex-shrink:0}
#joystick-dot{width:38px;height:38px;background:radial-gradient(circle,rgba(100,200,255,.7),rgba(60,140,255,.3));border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
#boost-btn{position:fixed;right:22px;bottom:34px;width:58px;height:58px;border-radius:50%;border:1.5px solid rgba(255,180,80,.5);background:rgba(255,160,50,.1);color:rgba(255,200,100,.9);font-family:'Courier New',monospace;font-size:9px;letter-spacing:1px;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:10;touch-action:none;user-select:none;line-height:1.3}
#boost-btn.active{background:rgba(255,160,50,.3)}
#boost-btn span{font-size:17px}
@media(max-width:768px){#hud h1{font-size:10px;letter-spacing:2px}#hud{font-size:9px;top:8px;left:8px}#nearest{font-size:9px;top:8px;right:8px}#nName{font-size:10px}#crosshair,#tourBtn,#timeBtn,#audioBtn{display:none}}

<body>
<div id="loading"><h1>КОСМОС</h1><p>ЗАГРУЗКА ВСЕЛЕННОЙ...</p><div class="bar"><div class="bar-fill"></div></div></div>
<div id="hud">
  <h1>★ КОСМИЧЕСКИЙ НАВИГАТОР</h1>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }     from 'three/addons/postprocessing/OutputPass.js';

// ── RENDERER ─────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.72;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.5, 400000);
camera.position.set(0, 280, 7800);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.55, 0.40, 0.22);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ── UTILS ────────────────────────────────────────────────────────────────────
const rnd  = (a,b) => a + Math.random()*(b-a);
const rndI = (a,b) => Math.floor(rnd(a,b));
const smoothstepJS = (e0,e1,x) => { const t=Math.max(0,Math.min(1,(x-e0)/(e1-e0))); return t*t*(3-2*t); };

// ── TEXTURES ─────────────────────────────────────────────────────────────────
function circleTex(S, spikes) {
    const cv = document.createElement('canvas'); cv.width = cv.height = S;
    const g = cv.getContext('2d'), H = S/2;
    const gr = g.createRadialGradient(H,H,0,H,H,H);
    gr.addColorStop(0,    'rgba(255,255,255,1)');
    gr.addColorStop(0.04, 'rgba(255,255,255,.97)');
    gr.addColorStop(0.15, 'rgba(255,255,255,.50)');
    gr.addColorStop(0.40, 'rgba(255,255,255,.10)');
    gr.addColorStop(1,    'rgba(255,255,255,0)');
    g.fillStyle = gr; g.fillRect(0,0,S,S);
    if (spikes) {
        g.globalCompositeOperation = 'lighter';
        const sp = (x1,y1,x2,y2,w) => {
            const s1=g.createLinearGradient(H,H,x1,y1);
            s1.addColorStop(0,'rgba(255,255,255,.18)');s1.addColorStop(.6,'rgba(255,255,255,.03)');s1.addColorStop(1,'rgba(255,255,255,0)');
            const s2=g.createLinearGradient(H,H,x2,y2);
            s2.addColorStop(0,'rgba(255,255,255,.18)');s2.addColorStop(.6,'rgba(255,255,255,.03)');s2.addColorStop(1,'rgba(255,255,255,0)');
            g.lineWidth=w;
            g.strokeStyle=s1;g.beginPath();g.moveTo(H,H);g.lineTo(x1,y1);g.stroke();
            g.strokeStyle=s2;g.beginPath();g.moveTo(H,H);g.lineTo(x2,y2);g.stroke();
        };
        sp(0,H,S,H,2.2); sp(H,0,H,S,2.2); sp(0,0,S,S,1.0); sp(S,0,0,S,1.0);
    }
    return new THREE.CanvasTexture(cv);
}

const TEX_STAR   = circleTex(128, true);
const TEX_SOFT   = circleTex(64,  false);

// Shared point material factory
function ptMat(tex, scale, minS, maxS, alpha) {
    return new THREE.ShaderMaterial({
        uniforms: { tex: { value: tex } },
        vertexShader: `
            attribute float pSize; attribute vec3 pColor; varying vec3 vC;
            void main(){
                vC = pColor;
                vec4 mv = modelViewMatrix * vec4(position,1.);
                gl_PointSize = clamp(pSize*(${scale.toFixed(0)}./-mv.z), ${minS.toFixed(1)}, ${maxS.toFixed(1)});
                gl_Position  = projectionMatrix * mv;
            }`,
        fragmentShader: `
            uniform sampler2D tex; varying vec3 vC;
            void main(){
                vec4 t = texture2D(tex, gl_PointCoord);
                if(t.a < 0.008) discard;
                gl_FragColor = vec4(vC * t.r, t.a * ${alpha.toFixed(2)});
            }`,
        blending: THREE.AdditiveBlending, depthWrite: false, transparent: true,
    });
}

function buildPts(pos, col, sz, mat) {
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    g.setAttribute('pColor',   new THREE.BufferAttribute(col, 3));
    g.setAttribute('pSize',    new THREE.BufferAttribute(sz,  1));
    return new THREE.Points(g, mat);
}

// ── BACKGROUND STARS ─────────────────────────────────────────────────────────
const PALETTE = [
    new THREE.Color(.55,.65,1.0), new THREE.Color(1.0,1.0,.98),
    new THREE.Color(1.0,.94,.80), new THREE.Color(1.0,.85,.50),
    new THREE.Color(1.0,.55,.25), new THREE.Color(.65,.80,1.0),
    new THREE.Color(.85,.90,1.0),
];

function starField(count, spread, sMin, sMax) {
    const pos=new Float32Array(count*3), col=new Float32Array(count*3), sz=new Float32Array(count);
    for (let i=0; i<count; i++) {
        const phi=Math.acos(2*Math.random()-1), theta=Math.random()*Math.PI*2;
        const r=Math.cbrt(Math.random())*spread;
        pos[i*3]=r*Math.sin(phi)*Math.cos(theta); pos[i*3+1]=r*Math.sin(phi)*Math.sin(theta); pos[i*3+2]=r*Math.cos(phi);
        const c=PALETTE[rndI(0,PALETTE.length)], b=rnd(.5,1.0);
        col[i*3]=c.r*b; col[i*3+1]=c.g*b; col[i*3+2]=c.b*b;
        sz[i]=rnd(sMin,sMax);
    }
    return buildPts(pos,col,sz, ptMat(TEX_STAR, 700, 1.2, 6.5, 1.0));
}
scene.add(starField(90000, 200000, 0.5, 3.0));
scene.add(starField(18000,  35000, 1.0, 5.0));

// ── GALAXY BUILDER ───────────────────────────────────────────────────────────
const galaxyReg = [];

function mkGalaxy(cfg) {
    const { name='Галактика', pos=new THREE.Vector3(), type='spiral',
            radius=4000, arms=4, twist=4.5, n=60000,
            cC=new THREE.Color(1,.85,.45), aC=new THREE.Color(.35,.55,1), tilt=0 } = cfg;
    const P=new Float32Array(n*3), C=new Float32Array(n*3), S=new Float32Array(n);

    for (let i=0; i<n; i++) {
        const r=Math.random(); let x,y,z,col,sz;
        if (type==='spiral') {
            const zone=r<.12?'core':r<.20?'bulge':r<.88?'arm':'halo';
            if (zone==='core') {
                const rr=Math.pow(Math.random(),2.5)*radius*.06, th=Math.random()*Math.PI*2;
                x=rr*Math.cos(th); z=rr*Math.sin(th); y=(Math.random()-.5)*rr*.2;
                col=new THREE.Color(1,.95,.80); col.multiplyScalar(rnd(1.0,1.5)); sz=rnd(2,5);
            } else if (zone==='bulge') {
                const rr=Math.pow(Math.random(),1.4)*radius*.18, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
                x=rr*Math.sin(ph)*Math.cos(th); z=rr*Math.cos(ph); y=rr*Math.sin(ph)*Math.sin(th)*.55;
                col=cC.clone().lerp(new THREE.Color(1,.9,.7),rnd(.3,.7)); col.multiplyScalar(rnd(.5,1.0)); sz=rnd(1,3.5);
            } else if (zone==='arm') {
                const arm=rndI(0,arms), angle=(arm/arms)*Math.PI*2;
                const rr=Math.pow(Math.random(),.4)*radius;
                const spiral=angle+(rr/radius)*twist*Math.PI;
                const armW=(.06+.10*(rr/radius))*rr, scatter=(Math.random()-.5)*armW*2;
                x=(rr+scatter*.6)*Math.cos(spiral); z=(rr+scatter*.6)*Math.sin(spiral);
                const h=radius*.018*Math.exp(-rr/(radius*.6));
                y=h*Math.tan((Math.random()-.5)*1.4);
                const t=Math.min(rr/radius,1);
                const fade=Math.exp(-t*2.5)*(1-Math.max(0,t-.7)/.3*.75);
                col=cC.clone().lerp(aC,Math.min(t,1)); col.multiplyScalar(rnd(.18,.85)*Math.max(fade,.02)); sz=rnd(.3,2.2);
            } else {
                const rr=rnd(radius*.2,radius*1.05), th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
                x=rr*Math.sin(ph)*Math.cos(th); z=rr*Math.cos(ph)*.4; y=rr*Math.sin(ph)*Math.sin(th)*.15;
                col=cC.clone().lerp(aC,Math.random()); col.multiplyScalar(rnd(.04,.15)); sz=rnd(.3,1.5);
            }
        } else if (type==='elliptical') {
            const rr=Math.pow(Math.random(),.5)*radius, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
            x=rr*Math.sin(ph)*Math.cos(th); y=rr*Math.sin(ph)*Math.sin(th)*.5; z=rr*Math.cos(ph)*.85;
            const fade=Math.exp(-(rr/radius)*2.2);
            col=cC.clone().lerp(aC,rr/radius); col.multiplyScalar(rnd(.35,1.0)*fade); sz=rnd(.5,2.8);
        } else {
            const cx=rnd(-radius*.6,radius*.6), cz=rnd(-radius*.6,radius*.6);
            x=cx+rnd(-radius*.4,radius*.4); z=cz+rnd(-radius*.4,radius*.4); y=(Math.random()-.5)*radius*.25;
            col=cC.clone().lerp(aC,Math.random()); col.multiplyScalar(rnd(.25,.9)); sz=rnd(.4,2.2);
        }
        P[i*3]=x; P[i*3+1]=y; P[i*3+2]=z;
        C[i*3]=col.r; C[i*3+1]=col.g; C[i*3+2]=col.b; S[i]=sz;
    }

    const grp=new THREE.Group();
    grp.add(buildPts(P,C,S, ptMat(TEX_SOFT, 880, 0.4, 4.2, 0.84)));
    grp.add(new THREE.Mesh(new THREE.SphereGeometry(radius*.016,16,16), new THREE.MeshBasicMaterial({color:cC})));
    grp.rotation.x=tilt; grp.position.copy(pos); scene.add(grp);
    galaxyReg.push({grp,name,pos:pos.clone(),radius});
}

// ── MILKY WAY ────────────────────────────────────────────────────────────────
function mkMilkyWay() {
    const N=420000, R=9000, TILT=Math.PI*.08;
    const P=new Float32Array(N*3), C=new Float32Array(N*3), S=new Float32Array(N);
    const ARM_ANG=[0,Math.PI*.5,Math.PI,Math.PI*1.5];
    const ARM_COL=[new THREE.Color(.55,.70,1.0),new THREE.Color(.40,.60,1.0),new THREE.Color(.50,.65,.95),new THREE.Color(.45,.62,1.0)];
    const CORE=new THREE.Color(1.0,.88,.58), BAR=new THREE.Color(1.0,.80,.45);

    for (let i=0; i<N; i++) {
        const r=Math.random(); let x,y,z,c,s;
        if (r<.04) {
            const rr=Math.pow(Math.random(),3.)*R*.025, th=Math.random()*Math.PI*2;
            x=rr*Math.cos(th); z=rr*Math.sin(th); y=(Math.random()-.5)*rr*.15;
            c=new THREE.Color(1.0,.95,.80); c.multiplyScalar(rnd(1.0,1.7)); s=rnd(2.5,5.5);
        } else if (r<.15) {
            const rr=Math.pow(Math.random(),1.5)*R*.20, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
            x=rr*Math.sin(ph)*Math.cos(th); z=rr*Math.cos(ph)*.65; y=rr*Math.sin(ph)*Math.sin(th)*.50;
            c=CORE.clone().lerp(new THREE.Color(1,.95,.7),Math.random());
            c.multiplyScalar(rnd(.4,.95)); s=rnd(.8,3.0);
        } else if (r<.23) {
            // Bar
            const t=Math.random(), bA=0.77, bL=R*.22, bW=R*.055;
            const bx=(t-.5)*2.*bL, bz=(Math.random()-.5)*bW*(1-Math.abs(t-.5));
            x=bx*Math.cos(bA)-bz*Math.sin(bA); z=bx*Math.sin(bA)+bz*Math.cos(bA);
            y=(Math.random()-.5)*bW*.15;
            c=BAR.clone().lerp(CORE,Math.random()); c.multiplyScalar(rnd(.35,.85)); s=rnd(.6,2.5);
        } else if (r<.90) {
            // Arms — log-spiral with smooth edge fade
            const ai=rndI(0,4), bA=ARM_ANG[ai];
            const rr=R*.08+Math.pow(Math.random(),.5)*R*.92;
            const ls=bA+(rr/R)*4.8*Math.PI;
            const aW=(.06+.10*(rr/R))*rr, sc=(Math.random()-.5)*aW*2.;
            x=(rr+sc*.6)*Math.cos(ls+sc*.00014); z=(rr+sc*.6)*Math.sin(ls+sc*.00014);
            const h=R*.016*Math.exp(-rr/(R*.55));
            y=h*Math.tan((Math.random()-.5)*1.3);
            const t=Math.min(rr/R,1.);
            // Smooth 3-zone fade: bright inner → mid → smooth outer edge
            const fade = Math.exp(-t*2.8) * (1.0 - smoothstepJS(0.62, 1.0, t)*0.88);
            if (Math.random()<.032) {
                c=new THREE.Color(.60,.75,1.0).lerp(new THREE.Color(1.,.52,.80),Math.random()*.3);
                c.multiplyScalar(rnd(.7,1.3)); s=rnd(1.4,3.8);
            } else {
                c=CORE.clone().lerp(ARM_COL[ai],Math.min(t*1.1,1.));
                c.multiplyScalar(rnd(.12,.75)*Math.max(fade,.015)); s=rnd(.3,2.0);
            }
        } else {
            // Halo
            const rr=rnd(R*.15,R*1.05), th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
            x=rr*Math.sin(ph)*Math.cos(th); z=rr*Math.cos(ph)*.35; y=rr*Math.sin(ph)*Math.sin(th)*.25;
            c=new THREE.Color(.65,.75,1.0); c.multiplyScalar(rnd(.04,.16)); s=rnd(.3,1.5);
        }
        P[i*3]=x; P[i*3+1]=y; P[i*3+2]=z;
        C[i*3]=c.r; C[i*3+1]=c.g; C[i*3+2]=c.b; S[i]=s;
    }

    const grp=new THREE.Group();
    grp.add(buildPts(P,C,S, ptMat(TEX_SOFT, 980, 0.4, 4.8, 0.86)));
    grp.add(new THREE.Mesh(new THREE.SphereGeometry(R*.009,16,16), new THREE.MeshBasicMaterial({color:new THREE.Color(1.,.84,.5)})));
    grp.rotation.x=TILT; scene.add(grp);
    galaxyReg.push({grp,name:'Млечный Путь',pos:new THREE.Vector3(),radius:R});
}

// ── BLACK HOLE (Sgr A*) ──────────────────────────────────────────────────────
function mkBlackHole() {
    const G=new THREE.Group();

    // Black sphere (event horizon)
    G.add(new THREE.Mesh(new THREE.SphereGeometry(80,32,32), new THREE.MeshBasicMaterial({color:0x000000})));

    // Bright photon ring — glows with bloom
    const ringMat=new THREE.MeshBasicMaterial({color:new THREE.Color(1.0,.65,.15),transparent:true,opacity:.55,side:THREE.BackSide});
    G.add(new THREE.Mesh(new THREE.SphereGeometry(92,32,32), ringMat));

    // Outer amber glow shell
    G.add(new THREE.Mesh(new THREE.SphereGeometry(160,32,32), new THREE.MeshBasicMaterial({color:new THREE.Color(.9,.45,.08),transparent:true,opacity:.06,side:THREE.BackSide})));

    // Accretion disc — flat particle ring, bright inner, doppler-colored
    const DN=80000;
    const dp=new Float32Array(DN*3), dc=new Float32Array(DN*3), ds=new Float32Array(DN);
    for (let i=0; i<DN; i++) {
        const rr=rnd(95,480), th=Math.random()*Math.PI*2;
        // Very flat disc — thinner near inner edge
        const h=(Math.random()-.5)*Math.max(2,(rr-95)*.08);
        dp[i*3]=rr*Math.cos(th); dp[i*3+1]=h; dp[i*3+2]=rr*Math.sin(th);
        // Doppler: left=blue (approaching), right=red/orange (receding)
        const dop=Math.cos(th);
        const inner=Math.max(0,1-(rr-95)/200); // brightness falloff
        const hot=new THREE.Color(1.0,.55,.05), cold=new THREE.Color(.25,.65,1.0);
        const c=hot.clone().lerp(cold,(dop+1)*.5);
        c.multiplyScalar(rnd(.5,1.8)*(.3+inner*1.1));
        dc[i*3]=c.r; dc[i*3+1]=c.g; dc[i*3+2]=c.b;
        ds[i]=rnd(.4, inner>.6?4.5:2.0);
    }
    G.add(buildPts(dp,dc,ds, ptMat(TEX_SOFT,900,.4,5.0,.95)));

    // Relativistic jets — blue-white columns N and S
    const JN=12000;
    const jp=new Float32Array(JN*3), jc=new Float32Array(JN*3), js=new Float32Array(JN);
    for (let i=0; i<JN; i++) {
        const side=i<JN/2?1:-1, h=rnd(90,700)*side, sp=Math.abs(h)*.05;
        jp[i*3]=(Math.random()-.5)*sp; jp[i*3+1]=h; jp[i*3+2]=(Math.random()-.5)*sp;
        const t=Math.abs(h)/700;
        const c=new THREE.Color(.45,.75,1.0).lerp(new THREE.Color(.2,.5,1.0),t);
        c.multiplyScalar(rnd(.4,1.2)*(1-t*.6));
        jc[i*3]=c.r; jc[i*3+1]=c.g; jc[i*3+2]=c.b; js[i]=rnd(.4,2.2);
    }
    G.add(buildPts(jp,jc,js, ptMat(TEX_SOFT,600,.4,3.0,.85)));
    scene.add(G);
    return G;
}

    const clouds=Array.from({length:9},()=>({x:rnd(-radius*.7,radius*.7),y:rnd(-radius*.25,radius*.25),z:rnd(-radius*.7,radius*.7),r:rnd(radius*.2,radius*.55)}));

        const rr=Math.pow(Math.random(),.55)*cl.r, fade=1-rr/cl.r;
        P[i*3]=cl.x+rr*Math.sin(ph)*Math.cos(th); P[i*3+1]=cl.y+rr*Math.sin(ph)*Math.sin(th)*.35; P[i*3+2]=cl.z+rr*Math.cos(ph);
        const c=c1.clone().lerp(c2,Math.random()); c.multiplyScalar(rnd(.35,1.0)*(.25+fade*.75));

// Procedural star surface shader — pulsing surface detail + corona
function starSurfaceMat(col) {
    return new THREE.ShaderMaterial({
        uniforms: { uCol:{value:col}, uTime:{value:0} },
        vertexShader:`
            varying vec3 vN; varying vec3 vP;
            void main(){ vN=normalize(normalMatrix*normal); vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
        fragmentShader:`
            uniform vec3 uCol; uniform float uTime;
            varying vec3 vN; varying vec3 vP;
            float hash(vec3 p){return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5);}
            float noise(vec3 p){vec3 i=floor(p);vec3 f=fract(p);f=f*f*(3.-2.*f);return mix(mix(mix(hash(i),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);}
            void main(){
                float n=noise(vP*.18+uTime*.12)*0.5+noise(vP*.42+uTime*.07)*0.3+noise(vP*.9)*0.2;
                float limb=pow(max(dot(vN,vec3(0,0,1)),0.),0.4);
                vec3 hotSpot=uCol*1.4; vec3 coolSpot=uCol*.7;
                vec3 c=mix(coolSpot,hotSpot,n*limb);
                gl_FragColor=vec4(c,1.);
            }`,
    });
}

const meteors=[]; let nextMeteor=5;
function spawnMeteor() {
    const dir=new THREE.Vector3(rnd(-1,1),rnd(-.3,.3),rnd(-1,0)).normalize();
    const perp=new THREE.Vector3(-dir.z,0,dir.x).normalize();
    const start=camera.position.clone().addScaledVector(dir,-1400).addScaledVector(perp,rnd(-400,400));
    const spd=rnd(1500,4200), len=rnd(70,200);
    const pts=[start.clone(),start.clone().addScaledVector(dir,len)];
    const mat=new THREE.LineBasicMaterial({color:new THREE.Color(.80,.90,1.),transparent:true,opacity:1.});
    const geo=new THREE.BufferGeometry().setFromPoints(pts);
    const line=new THREE.Line(geo,mat);
    scene.add(line);
    meteors.push({line,dir,spd,life:2.0,t:0,mat,geo,len,start:start.clone()});
}
function updateMeteors(dt) {
    nextMeteor-=dt;
    if (nextMeteor<=0){spawnMeteor();nextMeteor=rnd(6,16);}
    for (let i=meteors.length-1;i>=0;i--) {
        const m=meteors[i]; m.t+=dt;
        m.mat.opacity=Math.max(0,1-m.t/m.life);
        const head=m.start.clone().addScaledVector(m.dir,m.spd*m.t);
        const tail=head.clone().addScaledVector(m.dir,-m.len);
        const a=m.geo.attributes.position.array;
        tail.toArray(a,0); head.toArray(a,3);
        m.geo.attributes.position.needsUpdate=true;
        if(m.t>=m.life){scene.remove(m.line);meteors.splice(i,1);}
    }
}

let audioCtx=null, masterGain=null, drones=[], audioOn=false;

function initAudio() {
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    masterGain=audioCtx.createGain(); masterGain.gain.value=0.55; masterGain.connect(audioCtx.destination);

    // Convolver for reverb-like space feel
    const bufLen=audioCtx.sampleRate*2.5;
    const irBuf=audioCtx.createBuffer(2,bufLen,audioCtx.sampleRate);
    for(let ch=0;ch<2;ch++){const d=irBuf.getChannelData(ch);for(let i=0;i<bufLen;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bufLen,2.5);}
    const conv=audioCtx.createConvolver(); conv.buffer=irBuf;
    const convGain=audioCtx.createGain(); convGain.gain.value=0.35;
    conv.connect(convGain); convGain.connect(masterGain);

    // Layered drones: sub-bass + harmonics + shimmer
    [[36,.40,'sine'],[54,.22,'sine'],[72,.12,'sine'],[108,.06,'triangle'],[144,.03,'sine']].forEach(([f,g,type])=>{
        const o=audioCtx.createOscillator(), gn=audioCtx.createGain();
        gn.gain.value=g; o.type=type; o.frequency.value=f;
        // Slight detune for richness
        o.detune.value=rnd(-8,8);
        o.connect(gn); gn.connect(masterGain); gn.connect(conv); o.start();
        drones.push({o,gn});
    });

    // Low-pass filtered noise for cosmic hiss
    const noiseLen=audioCtx.sampleRate;
    const noiseBuf=audioCtx.createBuffer(1,noiseLen,audioCtx.sampleRate);
    const nd=noiseBuf.getChannelData(0); for(let i=0;i<noiseLen;i++) nd[i]=Math.random()*2-1;
    const nSrc=audioCtx.createBufferSource(); nSrc.buffer=noiseBuf; nSrc.loop=true;
    const lp=audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=180;
    const nGain=audioCtx.createGain(); nGain.gain.value=0.04;
    nSrc.connect(lp); lp.connect(nGain); nGain.connect(masterGain); nSrc.start();
}

function toggleAudio() {
    if(!audioCtx) { initAudio(); audioOn=true; }
    else {
        audioOn=!audioOn;
        if(audioCtx.state==='suspended') audioCtx.resume();
        masterGain.gain.setTargetAtTime(audioOn?.55:0, audioCtx.currentTime, .5);
    }
    document.getElementById('audioBtn').textContent=(audioOn?'🔊':'🔇')+' ЗВУК';
}

function updateAudio(dMW) {
    if(!audioCtx||!audioOn||drones.length===0) return;
    const t=audioCtx.currentTime, mw=Math.max(0,1-dMW/12000);
    drones[0].o.frequency.setTargetAtTime(36+mw*20, t, 1.0);
    drones[2].gn.gain.setTargetAtTime(.10+mw*.14, t, 1.0);
}

].forEach(([p,c,r])=>addStar(p,c,r));

document.getElementById('objCount').textContent=galaxyReg.length+nebReg.length;

// ── CONTROLS ─────────────────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{keys[e.code]=true;});
document.addEventListener('keyup',  e=>{keys[e.code]=false;});
let yaw=0,pitch=0,locked=false;
const euler=new THREE.Euler(0,0,0,'YXZ');
renderer.domElement.addEventListener('click',()=>renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange',()=>{
    locked=document.pointerLockElement===renderer.domElement;
    document.getElementById('hint').style.opacity=locked?'0':'1';
});
document.addEventListener('mousemove',e=>{
    if(!locked)return;
    yaw-=e.movementX*.0018; pitch-=e.movementY*.0018;
    pitch=Math.max(-Math.PI/2+.01,Math.min(Math.PI/2-.01,pitch));
});

// Mobile
const isMobile=('ontouchstart' in window)||(navigator.maxTouchPoints>0);
const joy={active:false,id:-1,ox:0,oy:0,dx:0,dy:0};
let touchBoost=false;
if (isMobile) {
    ['hint','controls'].forEach(id=>{document.getElementById(id).style.display='none'});
    document.getElementById('touch-look').style.display='block';
    document.getElementById('joystick-zone').style.display='flex';
    document.getElementById('boost-btn').style.display='flex';
    const jZ=document.getElementById('joystick-zone'), jR=document.getElementById('joystick-ring');
    const jD=document.getElementById('joystick-dot'), lZ=document.getElementById('touch-look');
    const bB=document.getElementById('boost-btn'); const JR=48;
    jZ.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0],rc=jR.getBoundingClientRect();joy.active=true;joy.id=t.identifier;joy.ox=rc.left+rc.width/2;joy.oy=rc.top+rc.height/2;},{passive:false});
    const upJ=ts=>{for(const t of ts){if(t.identifier!==joy.id)continue;let dx=t.clientX-joy.ox,dy=t.clientY-joy.oy;const l=Math.sqrt(dx*dx+dy*dy);if(l>JR){dx=dx/l*JR;dy=dy/l*JR;}joy.dx=dx/JR;joy.dy=dy/JR;jD.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;}};
    const rlJ=ts=>{for(const t of ts){if(t.identifier!==joy.id)continue;joy.active=false;joy.dx=0;joy.dy=0;jD.style.transform='translate(-50%,-50%)';}};
    jZ.addEventListener('touchmove',e=>{e.preventDefault();upJ(e.changedTouches);},{passive:false});
    jZ.addEventListener('touchend',e=>rlJ(e.changedTouches)); jZ.addEventListener('touchcancel',e=>rlJ(e.changedTouches));
    const lT=new Map();
    lZ.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.clientX<window.innerWidth*.48)continue;lT.set(t.identifier,{x:t.clientX,y:t.clientY});}},{passive:false});
    lZ.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){const p=lT.get(t.identifier);if(!p)continue;yaw-=(t.clientX-p.x)*.004;pitch-=(t.clientY-p.y)*.004;pitch=Math.max(-Math.PI/2+.01,Math.min(Math.PI/2-.01,pitch));lT.set(t.identifier,{x:t.clientX,y:t.clientY});}},{passive:false});
    lZ.addEventListener('touchend',e=>{for(const t of e.changedTouches)lT.delete(t.identifier);});
    lZ.addEventListener('touchcancel',e=>{for(const t of e.changedTouches)lT.delete(t.identifier);});
    bB.addEventListener('touchstart',e=>{e.preventDefault();touchBoost=true;bB.classList.add('active');},{passive:false});
    bB.addEventListener('touchend',()=>{touchBoost=false;bB.classList.remove('active');});
    bB.addEventListener('touchcancel',()=>{touchBoost=false;bB.classList.remove('active');});
}
document.getElementById('audioBtn').addEventListener('click',toggleAudio);

// ── HUD ──────────────────────────────────────────────────────────────────────
const $sp=document.getElementById('speed'),$px=document.getElementById('posX');
const $py=document.getElementById('posY'),$pz=document.getElementById('posZ');
const $nn=document.getElementById('nName'),$nd=document.getElementById('nDist'),$nt=document.getElementById('nType');
const velocity=new THREE.Vector3(); let speed=0, hudT=0;

function updateNearest(dt) {
    let best=null,bestD=Infinity;
    for(const g of galaxyReg){const d=camera.position.distanceTo(g.pos);if(d<bestD){bestD=d;best={name:g.name,type:'галактика',d,thresh:g.radius*2.2};}}
    for(const n of nebReg){const d=camera.position.distanceTo(n.pos);if(d<bestD){bestD=d;best={name:n.name,type:'туманность',d,thresh:n.radius*2.2};}}
    const dSS=camera.position.distanceTo(SS_POS);
    if(dSS<bestD){bestD=dSS;best={name:'Солнечная система',type:'планетная система',d:dSS,thresh:600};}
    const dBH=camera.position.length();
    if(dBH<bestD){bestD=dBH;best={name:'Sagittarius A*',type:'чёрная дыра',d:dBH,thresh:600};}
    if(best){
        $nn.textContent=best.name; $nd.textContent=(best.d/1000).toFixed(2)+' кпк'; $nt.textContent=best.type;
        if(best.d<best.thresh){showCard(best.name);}
        else{cardTimer-=dt;if(cardTimer<=0){icCard.style.opacity='0';lastCard='';}}
    }
    return camera.position.distanceTo(new THREE.Vector3(0,0,0));
}

// ── MAIN LOOP ────────────────────────────────────────────────────────────────
const clock=new THREE.Clock();
function animate() {
    requestAnimationFrame(animate);
    const dt=Math.min(clock.getDelta(),.05);

    if(!touring){euler.set(pitch,yaw,0);camera.quaternion.setFromEuler(euler);}
    updateTour(dt);

    if(!touring){
        const fast=keys['ShiftLeft']||keys['ShiftRight']||touchBoost;
        const spd=fast?3500:280;
        const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
        const rgt=new THREE.Vector3(1,0, 0).applyQuaternion(camera.quaternion);
        const up =new THREE.Vector3(0,1, 0);
        const mv=new THREE.Vector3();
        if(keys['KeyW']||keys['ArrowUp'])    mv.add(fwd);
        if(keys['KeyS']||keys['ArrowDown'])  mv.sub(fwd);
        if(keys['KeyA']||keys['ArrowLeft'])  mv.sub(rgt);
        if(keys['KeyD']||keys['ArrowRight']) mv.add(rgt);
        if(keys['KeyQ']||keys['Space'])      mv.add(up);
        if(keys['KeyE']||keys['ControlLeft'])mv.sub(up);
        if(joy.active){
            if(Math.abs(joy.dy)>.08){mv.add(fwd.clone().multiplyScalar(-joy.dy*(joy.dy<0?1:-1)))}
            if(Math.abs(joy.dx)>.08){mv.add(rgt.clone().multiplyScalar(joy.dx))}
        }
        const tgt=mv.lengthSq()>0?mv.normalize().multiplyScalar(spd):new THREE.Vector3();
        velocity.lerp(tgt,dt*3.5);
        camera.position.addScaledVector(velocity,dt);
        speed=velocity.length()/100;
        // (trails removed)
    }

    // Galaxy rotation
    const rd=dt*timeScale;
    for(const g of galaxyReg) g.grp.rotation.y+=rd*.004;

    // Planet orbits
    for(const p of ssObjects){
        p.angle+=p.spd*.001*dt*timeScale;
        p.mesh.position.set(Math.cos(p.angle)*p.orb,0,Math.sin(p.angle)*p.orb);
        p.mesh.rotation.y+=dt*.4*timeScale;
    }

    updateMeteors(dt);

    // Animate star surface shaders
    const now=performance.now()*.001;
    for(const m of starMats) m.uniforms.uTime.value=now;

    hudT+=dt;
    if(hudT>.06){
        hudT=0;
        $sp.textContent=speed.toFixed(1);
        $px.textContent=(camera.position.x/1000).toFixed(2)+' кпк';
        $py.textContent=(camera.position.y/1000).toFixed(2)+' кпк';
        $pz.textContent=(camera.position.z/1000).toFixed(2)+' кпк';
        const dMW=updateNearest(hudT);
        updateAudio(dMW);
    }

    composer.render();
}

window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
    composer.setSize(window.innerWidth,window.innerHeight);
});

setTimeout(()=>{const l=document.getElementById('loading');l.style.opacity='0';setTimeout(()=>l.remove(),1200);},2200);
animate();
</script>
